# Ingestão de cards Helena → Supabase, a cada hora (FASE A2 do
# PLANO_INGESTAO_E_PROCESSO.md). Mesmo desenho do sync-clinicorp: GitHub
# Actions dispara o endpoint por HTTP (plano Vercel sem cron horário nativo),
# 1 job por clínica em matrix. Aos :22 — fora dos :07/:37 do sync Clinicorp,
# para a ingestão fotografar o painel já atualizado pelo sync.
#
# URL própria (INGEST_URL) — NÃO deriva de SYNC_URL por substituição de string
# (frágil: dependia do secret terminar exatamente em ".../sync-clinicorp",
# quebrou em produção). Fallback: se INGEST_URL não existir ainda, cai para
# BASE_URL + /api/cron/ingest-cards (defina BASE_URL como o domínio raiz,
# ex: https://dashboardodontologico.vercel.app) — assim dá para rodar sem
# cadastrar um secret novo, mas o ideal é cadastrar INGEST_URL explícito.
name: Ingest Cards

on:
  schedule:
    - cron: '22 * * * *'
  workflow_dispatch: {}

jobs:
  listar-clinicas:
    runs-on: ubuntu-latest
    outputs:
      account_ids: ${{ steps.listar.outputs.account_ids }}
      url: ${{ steps.resolve.outputs.url }}
    steps:
      - name: Resolver URL do endpoint
        id: resolve
        run: |
          if [ -n "${{ secrets.INGEST_URL }}" ]; then
            url="${{ secrets.INGEST_URL }}"
          elif [ -n "${{ secrets.BASE_URL }}" ]; then
            url="${{ secrets.BASE_URL }}/api/cron/ingest-cards"
          else
            echo "::error::Cadastre o secret INGEST_URL (ou BASE_URL) em Settings > Secrets and variables > Actions."
            exit 1
          fi
          echo "url=$url" >> "$GITHUB_OUTPUT"
      - name: Listar clínicas com painel configurado
        id: listar
        run: |
          url="${{ steps.resolve.outputs.url }}"
          resp=$(curl -s --max-time 20 -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" "${url}?list=1")
          echo "Resposta: $resp"
          ids=$(echo "$resp" | jq -c '.accountIds // []') || { echo "::error::Resposta não é JSON válido — confira INGEST_URL/BASE_URL e se o deploy tem /api/cron/ingest-cards."; exit 1; }
          echo "account_ids=$ids" >> "$GITHUB_OUTPUT"

  ingerir:
    needs: listar-clinicas
    if: needs.listar-clinicas.outputs.account_ids != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        accountId: ${{ fromJson(needs.listar-clinicas.outputs.account_ids) }}
    steps:
      # --max-time 75 dá folga além do maxDuration=60 da function (vercel.json)
      # — sem isso o curl cortava ANTES da Vercel terminar de responder
      # (exit code 28/curl timeout, visto como "exit code 3" no job por causa
      # do pipe com o comando seguinte). --retry cobre lentidão pontual de
      # rede sem reprovar a clínica inteira por 1 execução ruim.
      - name: Ingerir clínica ${{ matrix.accountId }}
        run: |
          status=$(curl -s -o response.json -w "%{http_code}" \
            --max-time 75 --retry 2 --retry-delay 5 --retry-connrefused \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ needs.listar-clinicas.outputs.url }}?accountId=${{ matrix.accountId }}") || {
            echo "::error::curl falhou (timeout/conexão) para ${{ matrix.accountId }} — exit $?"
            exit 1
          }
          echo "HTTP $status"
          cat response.json
          if [ "$status" -ge 300 ]; then
            echo "::error::Ingestão de ${{ matrix.accountId }} falhou com HTTP $status"
            exit 1
          fi
