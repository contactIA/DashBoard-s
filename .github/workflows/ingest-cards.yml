# Ingestão de cards Helena → Supabase, a cada hora (FASE A2 do
# PLANO_INGESTAO_E_PROCESSO.md). Mesmo desenho do sync-clinicorp: GitHub
# Actions dispara o endpoint por HTTP (plano Vercel sem cron horário nativo),
# 1 job por clínica em matrix. Aos :22 — fora dos :07/:37 do sync Clinicorp,
# para a ingestão fotografar o painel já atualizado pelo sync.
#
# URL resolvida em CADA job a partir do secret (INGEST_URL, fallback
# BASE_URL + /api/cron/ingest-cards) — NÃO passa entre jobs via outputs (o
# GitHub apaga output que contém secret → URL vazia → curl falha, exit 3).
# O `tr -d` limpa espaço/quebra-de-linha que o humano cola sem querer no
# secret (causa real de um exit 3 em 20/07) — usabilidade à prova de erro.
#
# `concurrency` (22/07): mesma proteção do sync-clinicorp.yml — evita 2+
# execuções deste workflow rodando ao mesmo tempo (ex: disparo manual em cima
# do cron agendado). A ingestão é upsert idempotente (não cria duplicata),
# mas rodar em paralelo desperdiça chamadas à Helena/Supabase à toa.
concurrency:
  group: ingest-cards
  cancel-in-progress: true

name: Ingest Cards

on:
  schedule:
    - cron: '22 * * * *'
  workflow_dispatch: {}

jobs:
  listar-clinicas:
    runs-on: ubuntu-latest
    outputs:
      account_ids: ${{ steps.listar.outputs.account_ids }}
    steps:
      - name: Listar clínicas com painel configurado
        id: listar
        env:
          INGEST_URL: ${{ secrets.INGEST_URL }}
          BASE_URL: ${{ secrets.BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -n "$INGEST_URL" ]; then url="$INGEST_URL";
          elif [ -n "$BASE_URL" ]; then url="$BASE_URL/api/cron/ingest-cards";
          else echo "::error::Cadastre o secret INGEST_URL (ou BASE_URL)."; exit 1; fi
          url=$(printf '%s' "$url" | tr -d ' \t\r\n')  # remove espaço/quebra coladas no secret
          resp=$(curl -s --max-time 20 -H "Authorization: Bearer $CRON_SECRET" "${url}?list=1")
          echo "Resposta: $resp"
          ids=$(echo "$resp" | jq -c '.accountIds // []') || { echo "::error::Resposta não é JSON — confira INGEST_URL/deploy."; exit 1; }
          echo "account_ids=$ids" >> "$GITHUB_OUTPUT"

  ingerir:
    needs: listar-clinicas
    if: needs.listar-clinicas.outputs.account_ids != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        accountId: ${{ fromJson(needs.listar-clinicas.outputs.account_ids) }}
    steps:
      - name: Ingerir clínica ${{ matrix.accountId }}
        env:
          INGEST_URL: ${{ secrets.INGEST_URL }}
          BASE_URL: ${{ secrets.BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          ACCOUNT_ID: ${{ matrix.accountId }}
        run: |
          if [ -n "$INGEST_URL" ]; then url="$INGEST_URL";
          elif [ -n "$BASE_URL" ]; then url="$BASE_URL/api/cron/ingest-cards";
          else echo "::error::Cadastre o secret INGEST_URL (ou BASE_URL)."; exit 1; fi
          url=$(printf '%s' "$url" | tr -d ' \t\r\n')  # remove espaço/quebra coladas no secret
          status=$(curl -s -o response.json -w "%{http_code}" \
            --max-time 75 --retry 2 --retry-delay 5 --retry-connrefused \
            -H "Authorization: Bearer $CRON_SECRET" \
            "${url}?accountId=${ACCOUNT_ID}") || {
            echo "::error::curl falhou (timeout/conexão) para ${ACCOUNT_ID} — exit $?"
            exit 1
          }
          echo "HTTP $status"
          cat response.json
          if [ "$status" -ge 300 ]; then
            echo "::error::Ingestão de ${ACCOUNT_ID} falhou com HTTP $status"
            exit 1
          fi
