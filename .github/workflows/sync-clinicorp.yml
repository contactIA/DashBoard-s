# Dispara o sync Clinicorp -> Helena a cada hora via HTTP — usamos o GitHub
# Actions em vez do Cron nativo da Vercel porque o plano Hobby só libera
# cron 1x/dia (o schedule aqui não tem essa restrição). O horário exato do
# GitHub Actions já varia alguns minutos por natureza (fila do runner), o
# que também ajuda a não bater sempre no mesmo segundo contra o rate limit.
name: Sync Clinicorp

on:
  schedule:
    - cron: '7 * * * *'   # aos 7 minutos de cada hora (evita o topo da hora, quando mais crons disparam)
  workflow_dispatch: {}     # permite disparar manualmente na aba Actions do GitHub

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Chamar o endpoint de sync
        run: |
          status=$(curl -s -o response.json -w "%{http_code}" \
            --max-time 55 \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.SYNC_URL }}")
          echo "HTTP $status"
          cat response.json
          if [ "$status" -ge 300 ]; then
            echo "::error::Sync falhou com HTTP $status"
            exit 1
          fi
