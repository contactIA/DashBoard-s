# Dispara o sync Clinicorp -> Helena a cada 30 min via HTTP — usamos o GitHub
# Actions em vez do Cron nativo da Vercel porque o plano Hobby só libera
# cron 1x/dia (o schedule aqui não tem essa restrição).
#
# URL resolvida em CADA job a partir do secret (SYNC_URL, com fallback
# BASE_URL + /api/cron/sync-clinicorp) — NÃO passa entre jobs via outputs
# (o GitHub apaga outputs que contêm secret, o que deixava a URL vazia e o
# curl falhava com exit 3; mesma causa raiz do ingest, corrigida 20/07).
name: Sync Clinicorp

on:
  schedule:
    - cron: '7,37 * * * *'   # a cada 30 min, aos :07 e :37
  workflow_dispatch: {}

jobs:
  listar-clinicas:
    runs-on: ubuntu-latest
    outputs:
      account_ids: ${{ steps.listar.outputs.account_ids }}
    steps:
      - name: Listar clínicas com Clinicorp vinculado
        id: listar
        env:
          SYNC_URL: ${{ secrets.SYNC_URL }}
          BASE_URL: ${{ secrets.BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -n "$SYNC_URL" ]; then url="$SYNC_URL";
          elif [ -n "$BASE_URL" ]; then url="$BASE_URL/api/cron/sync-clinicorp";
          else echo "::error::Cadastre o secret SYNC_URL (ou BASE_URL)."; exit 1; fi
          url=$(printf '%s' "$url" | tr -d ' \t\r\n')  # remove espaço/quebra coladas no secret
          resp=$(curl -s --max-time 20 -H "Authorization: Bearer $CRON_SECRET" "${url}?list=1")
          echo "Resposta: $resp"
          ids=$(echo "$resp" | jq -c '.accountIds // []') || { echo "::error::Resposta não é JSON — confira SYNC_URL/deploy."; exit 1; }
          echo "account_ids=$ids" >> "$GITHUB_OUTPUT"

  sincronizar:
    needs: listar-clinicas
    if: needs.listar-clinicas.outputs.account_ids != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        accountId: ${{ fromJson(needs.listar-clinicas.outputs.account_ids) }}
    steps:
      - name: Sincronizar clínica ${{ matrix.accountId }}
        env:
          SYNC_URL: ${{ secrets.SYNC_URL }}
          BASE_URL: ${{ secrets.BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          ACCOUNT_ID: ${{ matrix.accountId }}
        run: |
          if [ -n "$SYNC_URL" ]; then url="$SYNC_URL";
          elif [ -n "$BASE_URL" ]; then url="$BASE_URL/api/cron/sync-clinicorp";
          else echo "::error::Cadastre o secret SYNC_URL (ou BASE_URL)."; exit 1; fi
          url=$(printf '%s' "$url" | tr -d ' \t\r\n')  # remove espaço/quebra coladas no secret
          status=$(curl -s -o response.json -w "%{http_code}" \
            --max-time 75 --retry 2 --retry-delay 5 --retry-connrefused \
            -H "Authorization: Bearer $CRON_SECRET" \
            "${url}?accountId=${ACCOUNT_ID}") || {
            echo "::error::curl falhou (timeout/conexão) para ${ACCOUNT_ID} — exit $?"
            exit 1
          }
          echo "HTTP $status"
          cat response.json
          if [ "$status" -ge 300 ]; then
            echo "::error::Sync de ${ACCOUNT_ID} falhou com HTTP $status"
            exit 1
          fi
